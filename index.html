<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>共识圈</title>
<meta name="x-backend" content="flask" />
<style>
:root {
  --primary:#FF2442; --bg:#FFFFFF; --text:#333333; --gray:#F5F5F5; --line:#EFEFEF;
  --font:"思源黑体","Source Han Sans SC","Source Han Sans CN","PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;font-family:var(--font);color:var(--text);background:#e9e9ee;}
body{display:flex;justify-content:center;}
.phone{width:100%;max-width:420px;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.12);}
.view{position:absolute;inset:0;background:var(--bg);}
.hidden{display:none !important;}
.progress-bar{position:absolute;top:0;left:0;height:3px;width:0;background:var(--primary);z-index:999;opacity:0;transition:opacity .2s;}
.progress-bar.active{opacity:1;animation:loadbar .9s ease-in-out infinite;}
@keyframes loadbar{0%{width:0;left:0;}50%{width:60%;left:20%;}100%{width:0;left:100%;}}
.auth-view{display:flex;align-items:center;justify-content:center;}
.auth-box{width:100%;max-width:320px;padding:24px;}
.logo{font-size:34px;font-weight:800;color:var(--primary);text-align:center;letter-spacing:2px;}
.logo-sub{text-align:center;color:#999;font-size:13px;margin:8px 0 28px;}
.tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:20px;}
.tab{flex:1;background:none;border:none;padding:12px 0;font-size:15px;color:#999;font-family:var(--font);cursor:pointer;position:relative;}
.tab.active{color:var(--text);font-weight:700;}
.tab.active::after{content:"";position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--primary);border-radius:2px;}
.auth-form{display:flex;flex-direction:column;gap:14px;}
.auth-form input{height:46px;border:1px solid var(--line);border-radius:10px;padding:0 14px;font-size:14px;font-family:var(--font);outline:none;}
.auth-form input:focus{border-color:var(--primary);}
.btn-primary{height:46px;background:var(--primary);color:#fff;border:none;border-radius:23px;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;margin-top:4px;}
.btn-primary:active{transform:scale(.98);}
.hint{text-align:center;font-size:12px;color:#bbb;}
.feed-view{display:flex;flex-direction:column;}
.topbar{height:52px;flex:0 0 52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line);background:var(--bg);}
.brand{font-size:18px;font-weight:800;color:var(--primary);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-badge{font-size:12px;color:#fff;background:var(--primary);padding:2px 8px;border-radius:10px;}
.user-badge.admin{background:#7a1fff;}
.link-btn{background:none;border:none;color:#999;font-size:14px;cursor:pointer;font-family:var(--font);}
  #refresh-btn{font-size:18px;line-height:1;padding:2px 6px;transition:transform .3s;}
  #refresh-btn:active{transform:rotate(180deg);}
.feed-list{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch;}
.empty{text-align:center;color:#bbb;font-size:13px;padding:40px 0;}
.card{position:relative;overflow:hidden;background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.05);cursor:pointer;border:1px solid var(--line);}
.card:active{background:#fafafa;}
.card-img{width:100%;height:200px;object-fit:cover;border-radius:10px;display:block;margin-bottom:12px;background:var(--gray);}
.card-img.placeholder{display:flex;align-items:center;justify-content:center;font-size:40px;color:#ddd;}
.card-title{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.4;}
.card-content{font-size:14px;color:#555;line-height:1.6;margin-bottom:12px;}
.card-meta{display:flex;align-items:center;justify-content:space-between;}
.author{font-size:13px;color:#999;}
.card-meta .right{display:flex;align-items:center;gap:14px;}
.like-btn{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:var(--font);padding:4px;color:var(--text);}
.heart{width:22px;height:22px;fill:none;stroke:var(--primary);stroke-width:2;transition:fill .12s ease;}
.heart.liked{fill:var(--primary);stroke:var(--primary);}
.heart.pop{animation:pop .42s ease;}
@keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.35);}70%{transform:scale(.85);}100%{transform:scale(1);}}
.like-count{font-size:13px;color:#888;}
.comment-ico{font-size:14px;color:#999;}
.ripple{position:absolute;border-radius:50%;background:rgba(255,36,66,.22);transform:scale(0);animation:ripple .6s ease-out;pointer-events:none;}
@keyframes ripple{to{transform:scale(2.4);opacity:0;}}
.fab{position:absolute;right:18px;bottom:24px;width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:28px;line-height:1;cursor:pointer;box-shadow:0 6px 18px rgba(255,36,66,.4);}
.fab:active{transform:scale(.92);}
.detail-view{transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column;}
.detail-view.open{transform:translateX(0);}
.detail-header{cursor:grab;}
.back-btn{background:none;border:none;color:var(--primary);font-size:16px;cursor:pointer;font-family:var(--font);}
.detail-title{font-size:15px;font-weight:600;}
.detail-scroll{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.detail-hero{width:100%;border-radius:12px;margin-bottom:16px;background:var(--gray);}
.detail-hero.placeholder{height:220px;display:flex;align-items:center;justify-content:center;font-size:44px;color:#ddd;}
.detail-title-big{font-size:20px;font-weight:800;margin-bottom:10px;line-height:1.4;}
.detail-content{font-size:15px;line-height:1.8;color:#444;white-space:pre-wrap;margin-bottom:14px;}
.detail-author{font-size:13px;color:#999;margin-bottom:18px;}
.detail-actions{display:flex;align-items:center;gap:16px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:18px;}
.detail-actions .heart{width:26px;height:26px;}
.detail-actions .like-btn{font-size:15px;}
.admin-del-post{margin-left:auto;background:#fff;color:var(--primary);border:1px solid var(--primary);border-radius:16px;padding:5px 12px;font-size:13px;cursor:pointer;}
.comments-title{font-size:15px;font-weight:700;margin-bottom:12px;}
.comment{position:relative;padding:10px 0;border-bottom:1px dashed var(--line);}
.comment .c-author{font-size:13px;font-weight:600;color:var(--primary);}
.comment .c-content{font-size:14px;line-height:1.6;margin:4px 0;white-space:pre-wrap;}
.comment .c-time{font-size:11px;color:#bbb;}
.comment .c-del{position:absolute;right:0;top:10px;background:none;border:none;color:#ccc;font-size:12px;cursor:pointer;}
.comment .c-del:hover{color:var(--primary);}
.no-comment{color:#bbb;font-size:13px;text-align:center;padding:16px 0;}
.detail-comment-bar{flex:0 0 auto;display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:var(--bg);}
.detail-comment-bar input{flex:1;height:40px;border:1px solid var(--line);border-radius:20px;padding:0 14px;font-size:14px;font-family:var(--font);outline:none;}
.detail-comment-bar button{background:var(--primary);color:#fff;border:none;border-radius:20px;padding:0 18px;font-size:14px;cursor:pointer;font-family:var(--font);}
.modal{position:absolute;inset:0;z-index:100;display:flex;align-items:flex-end;}
.modal-mask{position:absolute;inset:0;background:rgba(0,0,0,.4);}
.modal-card{position:relative;width:100%;background:var(--bg);border-radius:16px 16px 0 0;padding:18px;z-index:1;animation:slideUp .28s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-head{display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:700;margin-bottom:14px;}
.modal-card form{display:flex;flex-direction:column;gap:12px;}
.modal-card input[type=text],.modal-card textarea{border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;font-family:var(--font);outline:none;resize:none;}
.modal-card input:focus,.modal-card textarea:focus{border-color:var(--primary);}
.file-label{font-size:14px;color:#666;background:var(--gray);padding:12px;border-radius:10px;cursor:pointer;}
.toast{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 18px;border-radius:8px;font-size:14px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="phone">
  <div id="progress-bar" class="progress-bar"></div>
  <section id="auth-view" class="view auth-view">
    <div class="auth-box">
      <div class="logo">共识圈</div>
      <div class="logo-sub">记录生活 · 达成共识</div>
      <div class="tabs">
        <button class="tab active" data-tab="login">登录</button>
        <button class="tab" data-tab="register">注册</button>
      </div>
      <form id="login-form" class="auth-form">
        <input type="text" name="username" placeholder="用户名" autocomplete="username" />
        <input type="password" name="password" placeholder="密码" autocomplete="current-password" />
        <button type="submit" class="btn-primary">登 录</button>
      </form>
      <form id="register-form" class="auth-form hidden">
        <input type="text" name="username" placeholder="设置用户名" autocomplete="username" />
        <input type="password" name="password" placeholder="设置密码（≥6 位）" autocomplete="new-password" />
        <button type="submit" class="btn-primary">注 册</button>
      </form>
    </div>
  </section>
  <section id="feed-view" class="view feed-view hidden">
    <header class="topbar">
      <div class="brand">共识圈</div>
      <div class="topbar-right">
        <span id="user-badge" class="user-badge"></span>
        <button id="refresh-btn" class="link-btn" title="刷新">↻</button>
        <button id="logout-btn" class="link-btn">退出</button>
      </div>
    </header>
    <div id="feed-list" class="feed-list"></div>
    <button id="fab" class="fab" title="发动态">＋</button>
    <div id="feed-empty" class="empty hidden">还没有动态，点右下角发布第一条吧～</div>
  </section>
  <section id="detail-view" class="view detail-view">
    <header id="detail-header" class="topbar detail-header">
      <button id="back-btn" class="back-btn">‹ 返回</button>
      <div class="detail-title">动态详情</div>
      <div class="topbar-right"></div>
    </header>
    <div id="detail-scroll" class="detail-scroll"></div>
  </section>
  <div id="composer" class="modal hidden">
    <div class="modal-mask"></div>
    <div class="modal-card">
      <div class="modal-head"><span>发布动态</span><button id="composer-close" class="link-btn">取消</button></div>
      <form id="composer-form">
        <input type="text" name="title" placeholder="标题（选填）" maxlength="40" />
        <textarea name="content" placeholder="分享你的故事…" rows="4" maxlength="1000"></textarea>
        <label class="file-label"><input type="file" name="image" accept="image/*" hidden /><span id="file-name">📷 添加图片（选填）</span></label>
        <button type="submit" class="btn-primary">发 布</button>
      </form>
    </div>
  </div>
  <div id="toast" class="toast"></div>
</div>
<script>
(function(){
  "use strict";
  var USE_MOCK = (function(){
    var m = document.querySelector('meta[name="x-backend"]');
    return !(m && m.getAttribute("content") === "flask");
  })();
  var token = (typeof localStorage !== "undefined" && localStorage.getItem("token")) || "";
  var me = null;
  var feed = [];
  var page = 1, hasMore = true, loading = false;
  var cards = {};
  var $ = function(id){ return document.getElementById(id); };
  var authView=$("auth-view"), feedView=$("feed-view"), detailView=$("detail-view"),
      feedList=$("feed-list"), progressBar=$("progress-bar"), composer=$("composer");
  function toast(msg){ var t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},1400); }
  function now(){ var d=new Date(); function p(n){return (n<10?"0":"")+n;} return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds()); }
  function realApi(method, path, payload){
    var opts={ method:method, headers:{} };
    if(token) opts.headers["Authorization"]="Bearer "+token;
    if(method!=="GET" && payload){
      if(path==="/api/posts" && method==="POST"){
        var fd=new FormData();
        fd.append("title", payload.title||"");
        fd.append("content", payload.content||"");
        if(payload._file) fd.append("image", payload._file);
        opts.body=fd;
      } else {
        opts.headers["Content-Type"]="application/json";
        opts.body=JSON.stringify(payload);
      }
    }
    return fetch(path, opts).then(function(res){ return res.json(); }).then(function(body){ return { data: body }; });
  }
  function api(method, path, payload){ return realApi(method, path, payload); }
  function h(tag,attrs,children){
    var e=document.createElement(tag); attrs=attrs||{};
    for(var k in attrs){ if(!attrs.hasOwnProperty(k))continue; var v=attrs[k]; if(v==null)continue;
      if(k==="class")e.className=v; else if(k==="html")e.innerHTML=v;
      else if(k.slice(0,2)==="on"&&typeof v==="function")e.addEventListener(k.slice(2),v);
      else e.setAttribute(k,v); }
    if(children){
      if(typeof children==="string"||typeof children==="number"){ e.appendChild(document.createTextNode(String(children))); }
      else { for(var i=0;i<children.length;i++){var c=children[i]; if(c==null)continue; e.appendChild(typeof c==="string"?document.createTextNode(c):c);} }
    }
    return e;
  }
  var HEART="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z";
  function makeHeart(liked){ var s=document.createElementNS("http://www.w3.org/2000/svg","svg"); s.setAttribute("viewBox","0 0 24 24"); s.setAttribute("class","heart"+(liked?" liked":"")); s.innerHTML='<path d="'+HEART+'"></path>'; return s; }
  function showProgress(){progressBar.classList.add("active");}
  function hideProgress(){progressBar.classList.remove("active");}
  function attachRipple(el){ el.addEventListener("pointerdown",function(e){ var r=el.getBoundingClientRect(); var sz=Math.max(r.width,r.height); var s=document.createElement("span"); s.className="ripple"; s.style.width=s.style.height=sz+"px"; s.style.left=(e.clientX-r.left-sz/2)+"px"; s.style.top=(e.clientY-r.top-sz/2)+"px"; el.appendChild(s); setTimeout(function(){s.remove();},620); }); }
  function toggleLike(p,btn){
    api("POST","/api/posts/"+p.id+"/like").then(function(r){
      if(!r.data.ok){toast(r.data.msg||"操作失败");return;}
      p.liked=r.data.liked; p.like_count=r.data.like_count;
      btn.classList.toggle("liked",p.liked);
      var heart=btn.querySelector(".heart"); heart.classList.toggle("liked",p.liked);
      heart.classList.remove("pop"); void heart.offsetWidth; heart.classList.add("pop");
      var c=btn.querySelector(".like-count"); if(c)c.textContent=String(p.like_count);
    });
  }
  function postCard(p){
    var card=h("div",{class:"card",onclick:function(){openDetail(p.id);}});
    if(p.image) card.appendChild(h("img",{class:"card-img",src:p.image,alt:""}));
    else card.appendChild(h("div",{class:"card-img placeholder"},"📷"));
    var body=h("div",{class:"card-body"});
    if(p.title) body.appendChild(h("div",{class:"card-title"},p.title));
    if(p.content) body.appendChild(h("div",{class:"card-content"}, p.content.length>60?p.content.slice(0,60)+"…":p.content));
    var meta=h("div",{class:"card-meta"});
    meta.appendChild(h("span",{class:"author"},"@"+p.author));
    var right=h("div",{class:"right"});
    var likeBtn=h("button",{class:"like-btn"+(p.liked?" liked":""),onclick:function(e){e.stopPropagation();toggleLike(p,likeBtn);}});
    likeBtn.appendChild(makeHeart(p.liked)); var likeCount=h("span",{class:"like-count"},String(p.like_count)); likeBtn.appendChild(likeCount);
    right.appendChild(likeBtn); var commentIco=h("span",{class:"comment-ico"},"💬 "+p.comment_count); right.appendChild(commentIco);
    meta.appendChild(right); body.appendChild(meta); card.appendChild(body); attachRipple(card);
    cards[p.id]={card:card,likeBtn:likeBtn,likeCount:likeCount,commentIco:commentIco};
    return card;
  }
  function syncCard(post){ if(!post)return; for(var i=0;i<feed.length;i++){ if(feed[i].id===post.id){ feed[i].like_count=post.like_count; feed[i].comment_count=post.comment_count; feed[i].liked=post.liked; break; } } var c=cards[post.id]; if(!c)return; c.likeBtn.classList.toggle("liked",!!post.liked); var heart=c.likeBtn.querySelector(".heart"); if(heart)heart.classList.toggle("liked",!!post.liked); c.likeCount.textContent=String(post.like_count); c.commentIco.textContent="💬 "+post.comment_count; }
  function loadFeed(reset){
    if(loading)return; loading=true; showProgress();
    api("GET","/api/posts?page="+(reset?1:page+1)).then(function(r){
      hideProgress(); loading=false;
      if(!r.data.ok)return;
      page=r.data.page; hasMore=r.data.has_more;
      if(reset){ feed=[]; feedList.innerHTML=""; cards={}; }
      if(r.data.posts.length===0&&reset) $("feed-empty").classList.remove("hidden"); else $("feed-empty").classList.add("hidden");
      r.data.posts.forEach(function(p){ feed.push(p); feedList.appendChild(postCard(p)); });
    });
  }
  feedList.addEventListener("scroll",function(){ if(feedList.scrollTop+feedList.clientHeight>=feedList.scrollHeight-60){ if(hasMore&&!loading) loadFeed(false); } });
  $("refresh-btn").addEventListener("click",function(){ feedList.scrollTop=0; loadFeed(true); });
  var PTR={startY:null,dist:0,active:false,threshold:60};
  feedList.addEventListener("pointerdown",function(e){ if(feedList.scrollTop<=0){PTR.startY=e.clientY;PTR.active=false;} else {PTR.startY=null;} });
  feedList.addEventListener("pointermove",function(e){ if(PTR.startY==null||loading)return; var dy=e.clientY-PTR.startY; if(dy>0&&feedList.scrollTop<=0){ PTR.active=true; PTR.dist=Math.min(dy*0.5,90); feedList.style.transition="none"; feedList.style.transform="translateY("+PTR.dist+"px)"; showProgress(); } });
  function endPull(){ if(!PTR.active){PTR.startY=null;return;} var pass=PTR.dist>=PTR.threshold; feedList.style.transition="transform .2s"; feedList.style.transform=""; setTimeout(function(){feedList.style.transition="";},220); if(pass) loadFeed(true); else hideProgress(); PTR.active=false; PTR.startY=null; PTR.dist=0; }
  feedList.addEventListener("pointerup",endPull); feedList.addEventListener("pointercancel",endPull);
  var detailPost=null;
  function openDetail(id){ showProgress(); api("GET","/api/posts/"+id).then(function(r){ hideProgress(); if(!r.data.ok){toast(r.data.msg||"加载失败");return;} detailPost=r.data.post; renderDetail(detailPost); syncCard(detailPost); detailView.classList.add("open"); }); }
  function closeDetail(){ detailView.classList.remove("open"); syncCard(detailPost); }
  function renderDetail(p){
    var box=$("detail-scroll"); box.innerHTML="";
    if(p.image) box.appendChild(h("img",{class:"detail-hero",src:p.image,alt:""}));
    else box.appendChild(h("div",{class:"detail-hero placeholder"},"📷"));
    if(p.title) box.appendChild(h("div",{class:"detail-title-big"},p.title));
    if(p.content) box.appendChild(h("div",{class:"detail-content"},p.content));
    box.appendChild(h("div",{class:"detail-author"},"@"+p.author+" · "+p.created_at));
    var actions=h("div",{class:"detail-actions"});
    var likeBtn=h("button",{class:"like-btn"+(p.liked?" liked":""),onclick:function(){toggleLike(p,likeBtn);}});
    likeBtn.appendChild(makeHeart(p.liked)); likeBtn.appendChild(h("span",{class:"like-count"},String(p.like_count)));
    actions.appendChild(likeBtn);
    if(me&&me.is_admin) actions.appendChild(h("button",{class:"admin-del-post",onclick:function(){adminDeletePost(p.id);}},"删除动态"));
    box.appendChild(actions);
    box.appendChild(h("div",{class:"comments-title"},"评论 "+(p.comments?p.comments.length:0)));
    if(!p.comments||p.comments.length===0) box.appendChild(h("div",{class:"no-comment"},"还没有评论，快来抢沙发～"));
    else p.comments.forEach(function(c){ var it=h("div",{class:"comment"}); it.appendChild(h("div",{class:"c-author"},"@"+c.author)); it.appendChild(h("div",{class:"c-content"},c.content)); it.appendChild(h("div",{class:"c-time"},c.created_at)); if(me&&me.is_admin) it.appendChild(h("button",{class:"c-del",onclick:function(){adminDeleteComment(c.id);}},"删除")); box.appendChild(it); });
    var bar=h("div",{class:"detail-comment-bar"});
    var input=h("input",{type:"text",placeholder:"说点什么…",maxlength:"500"});
    var send=h("button",{onclick:function(){ var v=input.value.trim(); if(!v)return; api("POST","/api/posts/"+p.id+"/comments",{content:v}).then(function(rr){ if(!rr.data.ok){toast(rr.data.msg||"发送失败");return;} input.value=""; openDetail(p.id); }); }},"发送");
    bar.appendChild(input); bar.appendChild(send); box.appendChild(bar);
  }
  function adminDeletePost(id){ if(!confirm("确定删除该动态？"))return; api("DELETE","/api/posts/"+id).then(function(r){ if(!r.data.ok){toast(r.data.msg||"删除失败");return;} closeDetail(); loadFeed(true); }); }
  function adminDeleteComment(id){ if(!confirm("确定删除该评论？"))return; api("DELETE","/api/comments/"+id).then(function(r){ if(!r.data.ok){toast(r.data.msg||"删除失败");return;} if(detailPost) openDetail(detailPost.id); }); }
  var startX=null,dragging=false,dx=0;
  function onDown(e){ if(!detailView.classList.contains("open"))return; startX=e.clientX; dragging=true; dx=0; detailView.style.transition="none"; }
  function onMove(e){ if(!dragging)return; dx=e.clientX-startX; if(dx<0) detailView.style.transform="translateX("+dx+"px)"; }
  function onUp(){ if(!dragging)return; dragging=false; detailView.style.transition=""; if(dx<-80) closeDetail(); detailView.style.transform=""; }
  $("detail-header").addEventListener("pointerdown",onDown);
  window.addEventListener("pointermove",onMove); window.addEventListener("pointerup",onUp);
  $("back-btn").addEventListener("click",closeDetail);
  document.querySelectorAll(".tab").forEach(function(t){ t.addEventListener("click",function(){ document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");}); t.classList.add("active"); var tab=t.getAttribute("data-tab"); $("login-form").classList.toggle("hidden",tab!=="login"); $("register-form").classList.toggle("hidden",tab!=="register"); }); });
  $("login-form").addEventListener("submit",function(e){ e.preventDefault(); var f=e.target; api("POST","/api/login",{username:f.username.value.trim(),password:f.password.value}).then(function(r){ if(!r.data.ok){toast(r.data.msg||"登录失败");return;} if(!USE_MOCK && r.data.token){ token=r.data.token; try{localStorage.setItem("token",token);}catch(e){} } me=r.data.user; afterLogin(); }); });
  $("register-form").addEventListener("submit",function(e){ e.preventDefault(); var f=e.target; api("POST","/api/register",{username:f.username.value.trim(),password:f.password.value}).then(function(r){ if(!r.data.ok){toast(r.data.msg||"注册失败");return;} toast("注册成功，请登录"); document.querySelector('.tab[data-tab="login"]').click(); f.reset(); }); });
  $("logout-btn").addEventListener("click",function(){ token=""; me=null; try{localStorage.removeItem("token");}catch(e){} showAuth(); });
  function afterLogin(){ var b=$("user-badge"); b.textContent=(me.is_admin?"管理员 ":"@")+(me.is_admin?me.username:me.nickname); if(me.is_admin)b.classList.add("admin"); else b.classList.remove("admin"); showFeed(); loadFeed(true); }
  function showAuth(){ authView.classList.remove("hidden"); feedView.classList.add("hidden"); detailView.classList.remove("open"); }
  function showFeed(){ authView.classList.add("hidden"); feedView.classList.remove("hidden"); }
  $("fab").addEventListener("click",function(){composer.classList.remove("hidden");});
  $("composer-close").addEventListener("click",function(){composer.classList.add("hidden");});
  composer.querySelector(".modal-mask").addEventListener("click",function(){composer.classList.add("hidden");});
  composer.querySelector("input[name=image]").addEventListener("change",function(e){ var f=e.target.files[0]; $("file-name").textContent=f?("📷 "+f.name):"📷 添加图片（选填）"; });
  $("composer-form").addEventListener("submit",function(e){
    e.preventDefault(); var f=e.target;
    if(!f.content.value.trim()&&!f.title.value.trim()){toast("标题或内容不能为空");return;}
    var pl={title:f.title.value.trim(),content:f.content.value.trim()};
    pl._file=(f.image.files[0]||null);
    api("POST","/api/posts",pl).then(function(d){ if(!d.data.ok){toast(d.data.msg||"发布失败");return;} composer.classList.add("hidden"); f.reset(); $("file-name").textContent="📷 添加图片（选填）"; loadFeed(true); });
  });
  function boot(){ if(!token){showAuth();return;} api("GET","/api/me").then(function(r){ if(r.data.ok){me=r.data.user; afterLogin();} else {token=""; try{localStorage.removeItem("token");}catch(e){} showAuth();} }); }
  boot();
})();
</script>
</body>
</html>
