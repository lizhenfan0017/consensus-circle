<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>共识圈</title>
<!-- 预览/直接打开时 content="mock" → 启用内置演示数据（无需后端）；Flask 在 / 路由里把它替换为 flask，从而走真实共享后端 -->
<meta name="x-backend" content="mock" />
<style>
:root {
  --primary:#FF2442; --bg:#FFFFFF; --text:#333333; --gray:#F5F5F5; --line:#EFEFEF;
  --font:"思源黑体","Source Han Sans SC","Source Han Sans CN","PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;font-family:var(--font);color:var(--text);background:linear-gradient(160deg,#fdfdfe 0%,#eef0f6 100%);}
body{display:flex;justify-content:center;}
.phone{width:100%;max-width:420px;min-height:100vh;background:linear-gradient(160deg,#ffffff 0%,#f5f6fb 100%);position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.12);}
.view{position:absolute;inset:0;background:transparent;}
.hidden{display:none !important;}

.progress-bar{position:absolute;top:0;left:0;height:3px;width:0;background:var(--primary);z-index:999;opacity:0;transition:opacity .2s;}
.progress-bar.active{opacity:1;animation:loadbar .9s ease-in-out infinite;}
@keyframes loadbar{0%{width:0;left:0;}50%{width:60%;left:20%;}100%{width:0;left:100%;}}

/* 登录/注册 */
.auth-view{display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#ffffff 0%,#f5f6fb 100%);}
.auth-box{width:100%;max-width:320px;padding:24px;}
.logo{display:flex;flex-direction:column;align-items:center;gap:8px;font-size:34px;font-weight:800;color:var(--primary);text-align:center;letter-spacing:2px;}
.logo-img{width:64px;height:64px;border-radius:50%;object-fit:cover;}
.logo-sub{text-align:center;color:#999;font-size:13px;margin:8px 0 28px;}
.tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:20px;}
.tab{flex:1;background:none;border:none;padding:12px 0;font-size:15px;color:#999;font-family:var(--font);cursor:pointer;position:relative;}
.tab.active{color:var(--text);font-weight:700;}
.tab.active::after{content:"";position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--primary);border-radius:2px;}
.auth-form{display:flex;flex-direction:column;gap:14px;}
.auth-form input{height:46px;border:1px solid var(--line);border-radius:10px;padding:0 14px;font-size:14px;font-family:var(--font);outline:none;}
.auth-form input:focus{border-color:var(--primary);}
.btn-primary{height:46px;background:var(--primary);color:#fff;border:none;border-radius:23px;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;margin-top:4px;}
.btn-primary:active{transform:scale(.98);}
.hint{text-align:center;font-size:12px;color:#bbb;}

/* 信息流 */
.feed-view{display:flex;flex-direction:column;}
.topbar{height:52px;flex:0 0 52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.brand{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;color:var(--primary);}
.brand-logo{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-badge{font-size:12px;color:#fff;background:var(--primary);padding:2px 8px;border-radius:10px;}
.user-badge.admin{background:#7a1fff;}
.link-btn{background:none;border:none;color:#999;font-size:14px;cursor:pointer;font-family:var(--font);}
.feed-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;column-count:2;column-gap:12px;-webkit-overflow-scrolling:touch;}
.empty{text-align:center;color:#bbb;font-size:13px;padding:40px 0;}

/* 下拉刷新指示器 */
.ptr-indicator{position:absolute;top:92px;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:center;gap:8px;color:#b3b3bb;font-size:13px;opacity:0;pointer-events:none;z-index:40;transition:opacity .2s;}
.ptr-spinner{width:18px;height:18px;border:2px solid #d8d8e0;border-top-color:var(--primary);border-radius:50%;animation:ptrspin .8s linear infinite;}
@keyframes ptrspin{to{transform:rotate(360deg);}}

/* 搜索栏 */
.search-bar{flex:0 0 auto;padding:8px 12px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.search-bar input{flex:1;height:36px;border:1px solid var(--line);border-radius:18px;padding:0 14px;font-size:13px;font-family:var(--font);outline:none;background:#f8f8fc;color:var(--text);}
.search-bar input:focus{border-color:var(--primary);}

.card{position:relative;overflow:hidden;background:var(--bg);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.05);cursor:pointer;border:1px solid var(--line);break-inside:avoid;display:block;width:100%;}
.card:active{background:#fafafa;}
.card-img{width:100%;height:200px;object-fit:cover;border-radius:10px;display:block;margin-bottom:12px;background:var(--gray);}
.card-img.placeholder{display:flex;align-items:center;justify-content:center;font-size:40px;color:#ddd;}
.card-title{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.4;}
.card-content{font-size:14px;color:#555;line-height:1.6;margin-bottom:12px;}
.card-meta{display:flex;align-items:center;justify-content:space-between;}
.author{font-size:13px;color:#999;}
.card-meta .right{display:flex;align-items:center;gap:14px;}
.like-btn{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:var(--font);padding:4px;color:var(--text);}
.heart{width:22px;height:22px;fill:none;stroke:var(--primary);stroke-width:2;transition:fill .12s ease;}
.heart.liked{fill:var(--primary);stroke:var(--primary);}
.heart.pop{animation:pop .42s ease;}
@keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.35);}70%{transform:scale(.85);}100%{transform:scale(1);}}
.like-count{font-size:13px;color:#888;}
.comment-ico{font-size:14px;color:#999;}
.ripple{position:absolute;border-radius:50%;background:rgba(255,36,66,.22);transform:scale(0);animation:ripple .6s ease-out;pointer-events:none;}
@keyframes ripple{to{transform:scale(2.4);opacity:0;}}
.fab{position:absolute;right:18px;bottom:24px;width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:28px;line-height:1;cursor:pointer;box-shadow:0 6px 18px rgba(255,36,66,.4);}
.fab:active{transform:scale(.92);}

/* 详情 */
.detail-view{transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column;background:linear-gradient(160deg,#ffffff 0%,#f5f6fb 100%);}
.detail-view.open{transform:translateX(0);}
.detail-header{display:flex;align-items:center;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.detail-header .back-btn{width:40px;font-size:24px;line-height:1;padding:0;justify-content:flex-start;background:none;border:none;color:var(--primary);cursor:pointer;font-family:var(--font);}
.detail-header .detail-title{flex:1;text-align:center;font-size:16px;font-weight:600;}
.detail-header .topbar-right{width:40px;justify-content:flex-end;}
.detail-scroll{flex:1;overflow-y:auto;padding:16px;padding-bottom:64px;-webkit-overflow-scrolling:touch;}
.detail-hero{width:100%;border-radius:12px;margin-bottom:16px;background:var(--gray);}
.detail-hero.placeholder{height:220px;display:flex;align-items:center;justify-content:center;font-size:44px;color:#ddd;}
.detail-title-big{font-size:20px;font-weight:800;margin-bottom:10px;line-height:1.4;}
.detail-content{font-size:15px;line-height:1.8;color:#444;white-space:pre-wrap;margin-bottom:14px;}
.detail-author{font-size:13px;color:#999;margin-bottom:18px;}
.detail-actions{display:flex;align-items:center;gap:16px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:18px;}
.detail-actions .heart{width:26px;height:26px;}
.detail-actions .like-btn{font-size:15px;}
.admin-del-post{margin-left:auto;background:#fff;color:var(--primary);border:1px solid var(--primary);border-radius:16px;padding:5px 12px;font-size:13px;cursor:pointer;}
.comments-title{font-size:15px;font-weight:700;margin-bottom:12px;}
.comment{position:relative;padding:10px 0;border-bottom:1px dashed var(--line);}
.comment .c-author{font-size:13px;font-weight:600;color:var(--primary);}
.comment .c-content{font-size:14px;line-height:1.6;margin:4px 0;white-space:pre-wrap;}
.comment .c-time{font-size:11px;color:#bbb;}
.comment .c-del{position:absolute;right:0;top:10px;background:none;border:none;color:#ccc;font-size:12px;cursor:pointer;}
.comment .c-del:hover{color:var(--primary);}
.comment .c-acts{display:flex;align-items:center;gap:16px;margin-top:6px;}
.c-like{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:var(--font);padding:0;color:var(--text);}
.c-like .c-like-count{font-size:12px;color:#888;}
.c-reply{background:none;border:none;color:#999;font-size:13px;cursor:pointer;font-family:var(--font);}
.comment.reply{margin-left:14px;padding-left:10px;border-left:2px solid var(--line);}
.replies{margin-top:6px;}
.no-comment{color:#bbb;font-size:13px;text-align:center;padding:16px 0;}
.detail-comment-bar{position:absolute;left:0;right:0;bottom:0;z-index:60;flex:0 0 auto;display:flex;flex-direction:column;padding:8px 12px 10px;border-top:1px solid var(--line);background:rgba(255,255,255,.92);}
.reply-hint{font-size:12px;color:var(--primary);display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.reply-hint .x{color:#bbb;cursor:pointer;padding:0 4px;}
.bar-row{display:flex;gap:8px;}
.detail-comment-bar input{flex:1;height:40px;border:1px solid var(--line);border-radius:20px;padding:0 14px;font-size:14px;font-family:var(--font);outline:none;}
.detail-comment-bar button{background:var(--primary);color:#fff;border:none;border-radius:20px;padding:0 18px;font-size:14px;cursor:pointer;font-family:var(--font);}

/* 顶栏头像 */
.avatar-btn{width:30px;height:30px;border-radius:50%;overflow:hidden;background:var(--primary);color:#fff;font-weight:700;font-size:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font);padding:0;}
.avatar-btn .avatar-img{width:100%;height:100%;object-fit:cover;display:block;}

/* 个人中心 / 列表 / 设置 */
.page-view{position:absolute;inset:0;background:linear-gradient(160deg,#ffffff 0%,#f5f6fb 100%);transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);z-index:55;display:flex;flex-direction:column;}
.page-view.open{transform:translateX(0);}
.page-header{height:52px;flex:0 0 52px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.page-header .ph-back{background:none;border:none;color:var(--primary);font-size:24px;cursor:pointer;line-height:1;width:32px;text-align:left;}
.page-header .ph-title{flex:1;text-align:center;font-size:16px;font-weight:600;}
.icon-btn{background:none;border:none;color:#999;font-size:20px;cursor:pointer;font-family:var(--font);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.icon-btn:active{background:rgba(0,0,0,.05);}
.mi-svg{width:20px;height:20px;flex-shrink:0;}
.mi-svg .mi-stroke{fill:none;stroke:var(--primary);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.mi-svg .mi-fill{fill:var(--primary);}
.settings-ico{width:20px;height:20px;}
.settings-ico .si-stroke{fill:none;stroke:var(--primary);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}

/* 切换账号弹窗 */
.switch-modal{position:absolute;inset:0;z-index:120;display:flex;align-items:flex-end;}
.switch-card{position:relative;width:100%;background:var(--bg);border-radius:16px 16px 0 0;padding:18px 16px 24px;z-index:1;max-height:70vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.switch-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.switch-head span{font-size:16px;font-weight:700;}
.sw-acct{display:flex;align-items:center;gap:10px;padding:12px 8px;border-bottom:1px solid var(--line);cursor:pointer;}
.sw-acct:last-child{border-bottom:none;}
.sw-acct.active{background:#fff5f5;border-radius:8px;}
.sw-acct-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;}
.sw-acct-avatar img{width:100%;height:100%;object-fit:cover;}
.sw-acct-info{flex:1;min-width:0;}
.sw-acct-name{font-size:14px;font-weight:600;}
.sw-acct-id{font-size:11px;color:#999;margin-top:2px;}
.sw-del{flex:0 0 auto;background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;font-family:var(--font);padding:4px;}
.sw-add-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 0;border-top:1px solid var(--line);margin-top:8px;}
.sw-add-btn{display:flex;align-items:center;gap:6px;background:none;border:1px dashed var(--line);border-radius:12px;padding:10px 20px;font-size:14px;color:#999;cursor:pointer;font-family:var(--font);width:100%;justify-content:center;}
.sw-add-btn.disabled{color:#ddd;border-color:#eee;cursor:not-allowed;}
.page-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.profile-top{display:flex;flex-direction:row;align-items:center;gap:10px;padding:16px 4px 18px;}
.profile-avatar{width:64px;height:64px;flex:0 0 64px;border-radius:50%;overflow:hidden;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;}
.profile-avatar img{width:100%;height:100%;object-fit:cover;}
.profile-info{flex:1;min-width:0;}
.profile-name{font-size:17px;font-weight:700;margin:0;}
.profile-id{font-size:12px;color:#999;margin-top:4px;}
.pe-btn{flex:0 0 auto;width:36px;height:36px;border-radius:8px;background:#eee;color:#888;border:none;font-size:15px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;}
.pe-btn:active{background:#ddd;}
.menu{margin-top:18px;background:var(--bg);border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);}
.menu-item{display:flex;align-items:center;justify-content:flex-start;gap:12px;padding:15px 16px;background:var(--bg);border-bottom:1px solid var(--line);cursor:pointer;font-size:15px;}
.menu-item:last-child{border-bottom:none;}
.menu-item:active{background:#fafafa;}
.menu-item .mi-ico{width:24px;text-align:center;font-size:17px;flex:0 0 24px;}
.menu-item .mi-label{flex:1;min-width:0;}
.menu-item .arrow{color:#ccc;font-size:18px;margin-left:auto;}
.list-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);cursor:pointer;align-items:center;}
.list-item:last-child{border-bottom:none;}
.li-img{width:56px;height:56px;border-radius:8px;object-fit:cover;flex:0 0 56px;background:var(--gray);display:flex;align-items:center;justify-content:center;font-size:24px;color:#ddd;}
.li-mid{flex:1;min-width:0;}
.li-title{font-size:15px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.li-sub{font-size:13px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.li-time{font-size:11px;color:#bbb;margin-top:4px;}
.li-like{font-size:13px;color:var(--primary);flex:0 0 auto;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--bg);border-bottom:1px solid var(--line);font-size:15px;}
.settings-row .val{color:#999;font-size:14px;}
.logout-btn{margin-top:24px;width:100%;height:46px;background:#fff;color:var(--primary);border:1px solid var(--primary);border-radius:23px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);}

/* 个人中心「我的发布」双列瀑布 */
.profile-posts{margin-top:24px;}
.pp-title{font-size:15px;font-weight:700;margin-bottom:10px;padding:0 2px;}
.pp-grid{column-count:2;column-gap:12px;overflow-x:hidden;}
.pp-grid .card{margin-bottom:12px;}

/* 空评论沙发 */
.no-comment{display:flex;flex-direction:column;align-items:center;gap:10px;color:#bbb;font-size:13px;padding:24px 0;}
.sofa-ico{font-size:46px;color:#e3e3ea;line-height:1;}

/* 编辑资料弹窗 */
.edit-avatar{width:72px;height:72px;border-radius:50%;overflow:hidden;background:var(--gray);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;cursor:pointer;position:relative;}
.edit-avatar img{width:100%;height:100%;object-fit:cover;}
.edit-avatar .ph{font-size:30px;color:#ccc;}
.edit-avatar .cam{position:absolute;right:0;bottom:0;background:var(--primary);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:14px;}
#edit-form input[type=text]{border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;font-family:var(--font);outline:none;text-align:center;}

/* 弹窗 */
.modal{position:absolute;inset:0;z-index:100;display:flex;align-items:flex-end;}
.modal-mask{position:absolute;inset:0;background:rgba(0,0,0,.4);}
.modal-card{position:relative;width:100%;background:var(--bg);border-radius:16px 16px 0 0;padding:18px;z-index:1;animation:slideUp .28s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-head{display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:700;margin-bottom:14px;}
.modal-card form{display:flex;flex-direction:column;gap:12px;}
.modal-card input[type=text],.modal-card textarea{border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;font-family:var(--font);outline:none;resize:none;}
.modal-card input:focus,.modal-card textarea:focus{border-color:var(--primary);}
.file-label{font-size:14px;color:#666;background:var(--gray);padding:12px;border-radius:10px;cursor:pointer;}
.toast{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 18px;border-radius:8px;font-size:14px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="phone">
  <div id="progress-bar" class="progress-bar"></div>

  <section id="auth-view" class="view auth-view">
    <div class="auth-box">
      <div class="logo"><img src="static/logo.webp" class="logo-img" alt="" />共识圈</div>
      <div class="logo-sub">记录生活 · 达成共识</div>
      <div class="tabs">
        <button class="tab active" data-tab="login">登录</button>
        <button class="tab" data-tab="register">注册</button>
      </div>
      <form id="login-form" class="auth-form">
        <input type="text" name="username" placeholder="用户名" autocomplete="username" />
        <input type="password" name="password" placeholder="密码" autocomplete="current-password" />
        <button type="submit" class="btn-primary">登 录</button>
      </form>
      <form id="register-form" class="auth-form hidden">
        <input type="text" name="username" placeholder="设置用户名" autocomplete="username" />
        <input type="password" name="password" placeholder="设置密码（≥6 位）" autocomplete="new-password" />
        <button type="submit" class="btn-primary">注 册</button>
      </form>
    </div>
  </section>

  <section id="feed-view" class="view feed-view hidden">
    <header class="topbar">
      <div class="brand"><img src="static/logo.webp" class="brand-logo" alt="" />共识圈</div>
      <div class="topbar-right">
        <button id="dedupe-btn" class="link-btn hidden" title="清理重复动态">🧹</button>
        <button id="top-avatar" class="avatar-btn" title="个人中心">👤</button>
      </div>
    </header>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索动态…" maxlength="40" />
    </div>
    <div id="ptr" class="ptr-indicator"><span class="ptr-spinner"></span><span id="ptr-text">下拉刷新</span></div>
    <div id="feed-list" class="feed-list"></div>
    <button id="fab" class="fab" title="发动态">＋</button>
    <div id="feed-empty" class="empty hidden">还没有动态，点右下角发布第一条吧～</div>
  </section>

  <section id="detail-view" class="view detail-view">
    <header id="detail-header" class="topbar detail-header">
      <button id="back-btn" class="back-btn" title="返回">‹</button>
      <div class="detail-title">动态详情</div>
      <div class="topbar-right"><button id="share-btn" class="link-btn" title="分享链接">↗</button></div>
    </header>
    <div id="detail-scroll" class="detail-scroll"></div>

  var USE_MOCK = (function(){
    var m = document.querySelector('meta[name="x-backend"]');
    return !(m && m.getAttribute("content") === "flask");
  })();
  var KEY = "consensus_circle_preview_v1";

  // ---- IndexedDB 持久化：比 localStorage 更可靠；不可用时自动回落到内存 ----
  function openDB(){
    return new Promise(function(res){
      if(typeof indexedDB==="undefined"){ res(null); return; }
      try{
        var req=indexedDB.open("consensus_circle_preview",1);
        req.onupgradeneeded=function(){ var db=req.result; if(!db.objectStoreNames.contains("kv")) db.createObjectStore("kv"); };
        req.onsuccess=function(){ res(req.result); };
        req.onerror=function(){ res(null); };
        req.onblocked=function(){ res(null); };
      }catch(e){ res(null); }
    });
  }
  function idbGet(key){
    return new Promise(function(res){
      if(!idb){ res(null); return; }
      try{ var tx=idb.transaction("kv","readonly"); var r=tx.objectStore("kv").get(key);
        r.onsuccess=function(){ res(r.result||null); }; r.onerror=function(){ res(null); };
      }catch(e){ res(null); }
    });
  }
  function idbSet(key,val){
    return new Promise(function(res){
      if(!idb){ res(); return; }
      try{ var tx=idb.transaction("kv","readwrite"); tx.objectStore("kv").put(val,key);
        tx.oncomplete=function(){ res(); }; tx.onerror=function(){ res(); };
      }catch(e){ res(); }
    });
  }
  function loadState(){
    return openDB().then(function(db){ idb=db; return idbGet(KEY); })

  // 时间显示规则：一小时内→X分钟前；一小时外一天内→X小时前；7日内→X天前；
  // 7日外→月日（当年，如 04-09）；上一年的内容→年月日（如 2025-09-09）。不显示时分秒。
  function fmtTime(str){
    if(!str) return "";
    var parts=String(str).split(" ");
    var dParts=(parts[0]||"").split("-");
    var tParts=(parts[1]||"00:00:00").split(":");
    var y=+dParts[0], mo=+dParts[1], da=+dParts[2];
    var hh=+tParts[0], mm=+tParts[1];
    if(!y||!mo||!da) return str;
    var d=new Date(y,mo-1,da,hh,mm,0);
    if(isNaN(d.getTime())) return str;
    var now=new Date();
    var diff=now.getTime()-d.getTime();
    if(diff<0) diff=0;
    var min=Math.floor(diff/60000);
    if(min<1) return "刚刚";
    if(min<60) return min+"分钟前";
    var hr=Math.floor(min/60);
    if(hr<24) return hr+"小时前";
    var day=Math.floor(hr/24);
    if(day<7) return day+"天前";
    function p(n){return (n<10?"0":"")+n;}
    if(y===now.getFullYear()) return p(mo)+"-"+p(da);
    return y+"-"+p(mo)+"-"+p(da);
  }

  function buildComments(postId){
    var uid=currentUid();

      if(c.post_id!==postId) return;
      var cu=userById(c.user_id);

      var o=map[c.id];

    });

  // 模拟异步接口，返回 Promise<{data}>
  function mockApi(method, path, payload){
    return new Promise(function(resolve){
      setTimeout(function(){
        var data={ok:true};
        if(method==="POST" && path==="/api/register"){
          var u=payload.username.trim(), pw=payload.password;
          if(!u||!pw) return resolve({data:fail("用户名和密码不能为空")});
          if(pw.length<6) return resolve({data:fail("密码至少 6 位")});
          if(DB.users.some(function(x){return x.username===u;})) return resolve({data:fail("用户名已存在",409)});
          var nid=DB.users.length?Math.max.apply(null,DB.users.map(function(x){return x.id;}))+1:1;
          DB.users.push({id:nid,username:u,password:pw,nickname:u,is_admin:0,avatar:null});
          persist(); return resolve({data:{ok:true}});
        }
        if(method==="POST" && path==="/api/login"){
          var uu=payload.username.trim(), pp=payload.password;
          var usr=DB.users.filter(function(x){return x.username===uu;})[0];
          if(!usr||usr.password!==pp) return resolve({data:fail("用户名或密码错误",401)});
          token="u:"+usr.id; if(DB)DB.token=token; persist();
          return resolve({data:{ok:true,token:token,user:serUser(usr)}});
        }
        if(method==="POST" && path==="/api/me"){
          var cu=currentUser(); if(!cu) return resolve({data:fail("请先登录",401)});
          if(payload.nickname && payload.nickname.trim()) cu.nickname=payload.nickname.trim();
          if(payload.avatar) cu.avatar=payload.avatar;
          persist(); return resolve({data:{ok:true,user:serUser(cu)}});
        }
        if(path==="/api/me"){

  // ---------- 真实后端（仅 !USE_MOCK 时使用）：把扁平响应 {ok,...} 包成 {data:{...}} 对齐 UI ----------
  function realApi(method, path, payload){
    var opts={ method:method, headers:{} };
    if(token) opts.headers["Authorization"]="Bearer "+token;
    if(method!=="GET" && payload){
      // /api/posts 与 /api/me 以 FormData 提交（可能含文件），其余用 JSON
      var useForm = (path==="/api/posts" && method==="POST") || (path==="/api/me" && method==="POST");
      if(useForm){
        var fd=new FormData();
        if(path==="/api/me"){ fd.append("nickname", payload.nickname||""); if(payload._file) fd.append("avatar", payload._file); }
        else { fd.append("title", payload.title||""); fd.append("content", payload.content||""); if(payload._file) fd.append("image", payload._file); }
        opts.body=fd;
      } else {
        opts.headers["Content-Type"]="application/json";
        opts.body=JSON.stringify(payload);
      }
    }
    return fetch(path, opts).then(function(res){ return res.json(); }).then(function(body){ return { data: body }; })
      .catch(function(){
        // 本地预览没有后端服务器时，自动回落到内置演示数据（mock）
        if(!USE_MOCK){ USE_MOCK=true; if(!DB){ var s=seed(); DB=s; } }
        return mockApi(method, path, payload);
      });
  }

  // 统一入口：mock / 真实后端 二选一
  function api(method, path, payload){
    if(USE_MOCK) return mockApi(method, path, payload);
    return realApi(method, path, payload);
  }

  function h(tag,attrs,children){
    var e=document.createElement(tag); attrs=attrs||{};
    for(var k in attrs){ if(!attrs.hasOwnProperty(k))continue; var v=attrs[k]; if(v==null)continue;
      if(k==="class")e.className=v; else if(k==="html")e.innerHTML=v;
      else if(k.slice(0,2)==="on"&&typeof v==="function")e.addEventListener(k.slice(2),v);
      else e.setAttribute(k,v); }
    if(children){
      if(typeof children==="string"||typeof children==="number"){ e.appendChild(document.createTextNode(String(children))); }
      else { for(var i=0;i<children.length;i++){var c=children[i]; if(c==null)continue; e.appendChild(typeof c==="string"?document.createTextNode(c):c);} }
    }
    return e;
  }

  document.querySelectorAll(".tab").forEach(function(t){ t.addEventListener("click",function(){ document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");}); t.classList.add("active"); var tab=t.getAttribute("data-tab"); $("login-form").classList.toggle("hidden",tab!=="login"); $("register-form").classList.toggle("hidden",tab!=="register"); }); });
  $("login-form").addEventListener("submit",function(e){ e.preventDefault(); var f=e.target; api("POST","/api/login",{username:f.username.value.trim(),password:f.password.value}).then(function(r){ if(!r.data.ok){toast(r.data.msg||"登录失败");return;} if(!USE_MOCK && r.data.token){ token=r.data.token; try{localStorage.setItem("token",token);}catch(e){} } me=r.data.user; afterLogin(); }); });
  $("register-form").addEventListener("submit",function(e){ e.preventDefault(); var f=e.target; api("POST","/api/register",{username:f.username.value.trim(),password:f.password.value}).then(function(r){ if(!r.data.ok){toast(r.data.msg||"注册失败");return;} toast("注册成功，请登录"); document.querySelector('.tab[data-tab="login"]').click(); f.reset(); }); });
  $("dedupe-btn").addEventListener("click",function(){ if(!confirm("清理内容完全相同的重复动态？（每种各保留一条）")) return; showProgress(); api("POST","/api/admin/dedupe").then(function(r){ hideProgress(); if(!r.data.ok){toast(r.data.msg||"清理失败");return;} toast("已清理 "+(r.data.removed||0)+" 条重复动态"); loadFeed(true); }); });
  function afterLogin(){ setAvatar($("top-avatar"), me); $("dedupe-btn").classList.toggle("hidden",!me.is_admin); showFeed(); searchInput.value=""; loadFeed(true); if(pendingPost){ var pp=pendingPost; pendingPost=null; openDetail(pp); } }
  function showAuth(){ authView.classList.remove("hidden"); feedView.classList.add("hidden"); detailView.classList.remove("open"); closePages(); }
  function showFeed(){ authView.classList.add("hidden"); feedView.classList.remove("hidden"); }

  // ---------- 发布 ----------
  $("fab").addEventListener("click",function(){composer.classList.remove("hidden");});
  $("composer-close").addEventListener("click",function(){composer.classList.add("hidden");});
  composer.querySelector(".modal-mask").addEventListener("click",function(){composer.classList.add("hidden");});
  composer.querySelector("input[name=image]").addEventListener("change",function(e){ var f=e.target.files[0]; $("file-name").textContent=f?("📷 "+f.name):"📷 添加图片（选填）"; });
  $("composer-form").addEventListener("submit",function(e){
    e.preventDefault(); var f=e.target;
    if(f._submitting) return;                       // 防重复提交：冷启动慢时连点只会发 1 条
    if(!f.content.value.trim()&&!f.title.value.trim()){toast("标题或内容不能为空");return;}
    f._submitting=true;
    var btn=f.querySelector(".btn-primary"); var oldText=btn.textContent;
    btn.disabled=true; btn.textContent="发布中…";
    var finish=function(){ f._submitting=false; btn.disabled=false; btn.textContent=oldText; };
    var doPost=function(img){ var pl={title:f.title.value.trim(),content:f.content.value.trim()}; if(USE_MOCK) pl.image=img; else pl._file=(f.image.files[0]||null); api("POST","/api/posts",pl).then(function(d){ if(!d.data.ok){toast(d.data.msg||"发布失败");finish();return;} composer.classList.add("hidden"); f.reset(); $("file-name").textContent="📷 添加图片（选填）"; loadFeed(true); finish(); }); };
    var file=f.image.files[0];
    if(file && USE_MOCK){ var rd=new FileReader(); rd.onload=function(){doPost(rd.result);}; rd.readAsDataURL(file); }
    else doPost(null);
  });

  // ---------- 个人中心 / 我的数据 / 设置 ----------
  function closePages(){ profileView.classList.remove("open"); listView.classList.remove("open"); settingsView.classList.remove("open"); }
  function backToProfile(){ listView.classList.remove("open"); settingsView.classList.remove("open"); if(me) profileView.classList.add("open"); }
  function showProfile(){
    setAvatar($("profile-avatar"), me);
    $("profile-name").textContent = me?me.nickname:"";
    $("profile-id").textContent = "ID：" + (me?me.username:"");
    closePages();
    profileView.classList.add("open");
    loadMyPosts();
  }
  function loadMyPosts(){
    var grid=$("profile-posts-grid"), empty=$("profile-posts-empty");
    grid.innerHTML=""; empty.classList.add("hidden");
    showProgress();
    api("GET","/api/me/posts").then(function(r){
      hideProgress();
      if(!r.data.ok) return;
      var posts=r.data.posts||[];
      if(!posts.length){ empty.classList.remove("hidden"); return; }
      posts.forEach(function(p){ grid.appendChild(postCard(p)); });
    });
  }
  $("top-avatar").addEventListener("click",function(){ if(!me){ toast("请先登录"); return; } showProfile(); });
  $("profile-back").addEventListener("click",closePages);
  $("mi-likes").addEventListener("click",function(){ showList("likes"); });
  $("mi-comments").addEventListener("click",function(){ showList("comments"); });
  $("mi-history").addEventListener("click",function(){ showList("history"); });
  $("profile-settings-btn").addEventListener("click",function(){ closePages(); settingsView.classList.add("open"); });
  $("mi-switch").addEventListener("click",function(){ showSwitchModal(); });
  $("settings-back").addEventListener("click",backToProfile);
  $("settings-logout").addEventListener("click",function(){ if(confirm("确定退出登录？")) doLogout(); });

  function showList(type){
    var title = type==="likes"?"我的点赞": type==="comments"?"我的评论": type==="history"?"浏览记录":"我的发布";
    $("list-title").textContent=title;
    var box=$("list-body"); box.innerHTML="";
    showProgress();
    var ep = type==="likes"?"/api/me/likes": type==="comments"?"/api/me/comments":"/api/me/history";
    api("GET", ep).then(function(r){
      hideProgress();
      if(!r.data.ok){ toast(r.data.msg||"加载失败"); return; }
      if(type==="comments"){
        if(!r.data.comments.length) box.appendChild(h("div",{class:"empty"},"还没有评论"));
        r.data.comments.forEach(function(c){
          var it=h("div",{class:"list-item",onclick:function(){ closePages(); openDetail(c.post_id); }});
          it.appendChild(h("div",{class:"li-title"},"《"+(c.post_title||"动态")+"》"));
          it.appendChild(h("div",{class:"li-sub"},c.content));
          it.appendChild(h("div",{class:"li-time"},fmtTime(c.created_at)));
          box.appendChild(it);
        });
      } else {
        var posts=r.data.posts||[];
        var emptyText = type==="likes"?"还没有点赞": type==="history"?"还没有浏览记录":"还没有发布";
        if(!posts.length) box.appendChild(h("div",{class:"empty"},emptyText));
        posts.forEach(function(p){ box.appendChild(profilePostItem(p, p.viewed_at||p.created_at)); });
      }
      closePages(); listView.classList.add("open");
    });
  }
  function profilePostItem(p, time){
    var it=h("div",{class:"list-item",onclick:function(){ closePages(); openDetail(p.id); }});
    if(p.image) it.appendChild(h("img",{class:"li-img",src:p.image,alt:""}));
    else it.appendChild(h("div",{class:"li-img placeholder"},"📷"));
    var mid=h("div",{class:"li-mid"});
    if(p.title) mid.appendChild(h("div",{class:"li-title"},p.title));
    mid.appendChild(h("div",{class:"li-sub"},(p.content||"").slice(0,40)));
    if(time) mid.appendChild(h("div",{class:"li-time"},fmtTime(time)));
    it.appendChild(mid);
    it.appendChild(h("div",{class:"li-like"},"♥ "+p.like_count));
    return it;
  }
  $("list-back").addEventListener("click",backToProfile);

  // 编辑资料
  $("profile-edit-btn").addEventListener("click",function(){
    $("edit-name").value = me?me.nickname:"";
    editAvatarPreview = (me&&me.avatar) ? me.avatar : null;
    renderEditAvatar();
    $("edit-profile").classList.remove("hidden");
  });
  $("edit-close").addEventListener("click",function(){ $("edit-profile").classList.add("hidden"); });
  $("edit-profile").querySelector(".modal-mask").addEventListener("click",function(){ $("edit-profile").classList.add("hidden"); });
  $("edit-avatar-label").addEventListener("click",function(){ $("edit-avatar-input").click(); });
  $("edit-avatar-input").addEventListener("change",function(e){ var f=e.target.files[0]; if(!f) return; var rd=new FileReader(); rd.onload=function(){ editAvatarPreview=rd.result; renderEditAvatar(); }; rd.readAsDataURL(f); });
  function renderEditAvatar(){
    var img=$("edit-avatar-img"), ph=$("edit-avatar-ph");
    if(editAvatarPreview){ img.src=editAvatarPreview; img.classList.remove("hidden"); ph.classList.add("hidden"); }
    else { img.classList.add("hidden"); ph.classList.remove("hidden"); }
  }
  $("edit-form").addEventListener("submit",function(e){
    e.preventDefault();
    if(!me){ toast("请先登录"); return; }
    var name=$("edit-name").value.trim();
    var file=$("edit-avatar-input").files[0] || null;
    var pl={ nickname:name, _file:file, avatar:editAvatarPreview };
    showProgress();
    api("POST","/api/me", pl).then(function(r){
      hideProgress();
      if(!r.data.ok){ toast(r.data.msg||"保存失败"); return; }
      me=r.data.user;
      setAvatar($("top-avatar"), me); setAvatar($("profile-avatar"), me);
      $("profile-name").textContent=me.nickname;
      $("edit-profile").classList.add("hidden");
      toast("资料已保存");
    });
  });

  // ---------- 搜索 ----------
  var searchInput=$("search-input");
  var allFeed=[];  // 原始数据（搜索前缓存）
  function doSearch(){
    var q=(searchInput.value||"").trim().toLowerCase();
    if(!q){ feedList.innerHTML=""; feed=allFeed; feed.forEach(function(p){ feedList.appendChild(postCard(p)); }); return; }
    feedList.innerHTML="";
    var hits=allFeed.filter(function(p){
      return (p.title&&p.title.toLowerCase().indexOf(q)!==-1) ||
             (p.content&&p.content.toLowerCase().indexOf(q)!==-1);
    });
    hits.forEach(function(p){ feedList.appendChild(postCard(p)); });
    $("feed-empty").classList.toggle("hidden",hits.length>0);
  }
  searchInput.addEventListener("input",doSearch);

  // ---------- 切换账号（最多3个）----------
  var MAX_ACCOUNTS=3;
  function getAccounts(){
    try{ var s=USE_MOCK?(DB?DB.accounts:null):null; if(s)return s; var raw=localStorage.getItem("cc_accounts"); return raw?JSON.parse(raw):[]; }catch(e){return [];}
  }
  function saveAccounts(accts){
    if(USE_MOCK){ if(DB)DB.accounts=accts; persist(); } else { try{localStorage.setItem("cc_accounts",JSON.stringify(accts));}catch(e){} }
  }
  function currentAccountInfo(){
    if(!me) return null;
    var accts=getAccounts();
    for(var i=0;i<accts.length;i++){ if(accts[i].token===token) return accts[i]; }
    // 当前账号可能不在列表里（首次登录），自动加入
    var info={username:me.username,nickname:me.nickname,avatar:me.avatar,token:token};
    accts.push(info); saveAccounts(accts); return info;
  }
  function renderSwitchModal(){
    var list=$("switch-list"), btn=$("sw-add-btn");
    list.innerHTML=""; var accts=getAccounts();
    for(var i=0;i<accts.length;i++){
      (function(a){
        var row=h("div",{class:"sw-acct"+(a.token===token?" active":"")});
        var av=h("div",{class:"sw-acct-avatar"});
        if(a.avatar){ var im=document.createElement("img"); im.src=a.avatar; av.appendChild(im); }
        else av.appendChild(document.createTextNode((a.nickname||"U").slice(0,1)));
        row.appendChild(av);
        var info=h("div",{class:"sw-acct-info"});
        info.appendChild(h("div",{class:"sw-acct-name"},a.nickname||a.username));
        info.appendChild(h("div",{class:"sw-acct-id"},"@"+a.username));
        row.appendChild(info);
        if(accts.length>1){
          var del=h("button",{class:"sw-del",onclick:function(e){e.stopPropagation();removeAccount(i);}},"✕");
          row.appendChild(del);
        }
        row.addEventListener("click",function(){ if(a.token!==token) switchToAccount(a); });
        list.appendChild(row);
      })(accts[i]);
    }
    btn.classList.toggle("disabled",accts.length>=MAX_ACCOUNTS);
  }
  function showSwitchModal(){
    currentAccountInfo();  // ensure current account is in list
    renderSwitchModal();
    $("switch-modal").classList.remove("hidden");
  }
  function hideSwitchModal(){$("switch-modal").classList.add("hidden");}
  $("switch-mask").addEventListener("click",hideSwitchModal);
  $("switch-close").addEventListener("click",hideSwitchModal);
  $("sw-add-btn").addEventListener("click",function(){
    if(getAccounts().length>=MAX_ACCOUNTS){toast("最多保留"+MAX_ACCOUNTS+"个账号");return;}
    hideSwitchModal(); doLogout();
  });
  function removeAccount(idx){
    var accts=getAccounts();
    var removed=accts[idx];
    accts.splice(idx,1); saveAccounts(accts);
    if(removed.token===token){
      // 删除的是当前账号，切换到第一个或退出
      if(accts.length>0) switchToAccount(accts[0]);
      else { doLogout(); hideSwitchModal(); return; }
    }
    renderSwitchModal();
  }
  function switchToAccount(acct){
    token=acct.token; saveAccounts(accts);
    hideSwitchModal();
    closePages();
    api("GET","/api/me").then(function(r){
      if(r.data.ok){ me=r.data.user; afterLogin(); }
      else { token=""; me=null; showAuth(); }
    });
  }

  // ---------- 启动 ----------
  function doLogout(){
    token=""; me=null;
    if(USE_MOCK){ if(DB)DB.token=""; persist(); } else { try{localStorage.removeItem("token");}catch(e){} }
    searchInput.value="";
    closePages();
    showAuth();
  }
  function boot(){ if(!token){ showAuth(); if(pendingPost){ var pp=pendingPost; openDetail(pp); } return; } api("GET","/api/me").then(function(r){ if(r.data.ok){me=r.data.user; afterLogin();} else {token=""; if(USE_MOCK){ if(DB)DB.token=""; persist(); } else { try{localStorage.removeItem("token");}catch(e){} } showAuth(); if(pendingPost){ var pp=pendingPost; openDetail(pp); } } }); }
  loadState().then(function(s){ DB=s; if(USE_MOCK){ token=s.token||""; } boot(); });
})();
</script>
</body>
</html>
